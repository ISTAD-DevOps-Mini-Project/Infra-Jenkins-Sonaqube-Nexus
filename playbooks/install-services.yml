---
- name: Install services on Jenkins machine
  hosts: jenkins
  gather_facts: true # Before installing Docker & Jenkins, Ansible will run the setup module to collect system info from the Jenkins server.
  become: true
  roles:
    - role: docker
    - role: jenkins

- name: Install services on SonarQube machine
  hosts: sonarqube
  gather_facts: true
  become: true
  roles:
    - role: docker
    - role: sonarqube

- name: Install services on Nexus machine
  hosts: nexus
  gather_facts: true
  become: true
  roles:
    - role: docker
    - role: nexus